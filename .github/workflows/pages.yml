name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Run Unit Tests
        run: npm run test:unit

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build server target
        run: npm run build

      - name: Build static export
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER_PAGES_REPO="${{ github.repository_owner }}.github.io"

          if [ "$REPO_NAME" = "$OWNER_PAGES_REPO" ]; then
            npm run build:pages
          else
            npm run build:pages -- "$REPO_NAME"
          fi

      - name: Check links
        run: npm run check:links

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify_public_endpoints:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify Vercel, GitHub Pages, and server endpoints
        run: |
          set -euo pipefail

          repo_name="${{ github.event.repository.name }}"
          owner="${{ github.repository_owner }}"

          if [ "${repo_name}" = "${owner}.github.io" ]; then
            pages_url="https://${owner}.github.io/"
          else
            pages_url="https://${owner}.github.io/${repo_name}/"
          fi

          for url in \
            "https://my-resume-gray-five.vercel.app" \
            "${pages_url}" \
            "http://106.12.154.163"
          do
            echo "Checking ${url}"
            curl -fsSL --retry 5 --retry-delay 3 --max-time 20 "${url}" >/dev/null
          done
