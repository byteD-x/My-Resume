# Deploy to a self-hosted server via SSH + systemd.
# Required secrets:
# - SERVER_HOST
# - SERVER_SSH_PRIVATE_KEY
# - SERVER_KNOWN_HOSTS (e.g. `ssh-keyscan -H 106.12.154.163`)
# Optional secrets (defaults provided):
# - SERVER_PORT, SERVER_USER, SERVER_APP_DIR, SERVER_SERVICE_NAME
#
# Server expectations (recommended):
# - systemd service uses WorkingDirectory=$SERVER_APP_DIR/current and runs `npm start`
# - Nginx reverse proxy to http://127.0.0.1:3000
name: Deploy Server

on:
  workflow_run:
    workflows: ["Deploy GitHub Pages"]
    branches: ["main"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch/tag/SHA) to deploy"
        required: false
        default: "main"

permissions:
  contents: read

concurrency:
  group: "deploy-server"
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event != 'pull_request')
      }}
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: "20"
      NEXT_PUBLIC_SITE_URL: "http://106.12.154.163"
      SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER || 'root' }}
      SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR || '/var/www/portfolio' }}
      SERVER_SERVICE_NAME: ${{ secrets.SERVER_SERVICE_NAME || 'portfolio.service' }}

    steps:
      - name: Checkout (workflow_run)
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (server)
        env:
          # Avoid flaky network fetch in CI build; the repo already contains src/data/github-telemetry.json.
          SKIP_GITHUB_FETCH: "1"
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run build

      - name: Package deployment archive
        run: |
          set -euo pipefail
          tar -czf deploy.tgz \
            .next \
            public \
            package.json \
            package-lock.json \
            next.config.ts \
            image-loader.ts
          ls -lh deploy.tgz

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}

      - name: Configure SSH known_hosts
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Compute release id
        id: meta
        run: |
          set -euo pipefail
          short_sha="$(git rev-parse --short=7 HEAD)"
          ts="$(date -u +'%Y%m%d%H%M%S')"
          release_id="${ts}-${short_sha}"
          echo "release_id=${release_id}" >> "$GITHUB_OUTPUT"

      - name: Create remote release directory
        run: |
          set -euo pipefail
          release_dir="${SERVER_APP_DIR}/releases/${{ steps.meta.outputs.release_id }}"
          ssh -o BatchMode=yes -o StrictHostKeyChecking=yes -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
            "set -e; mkdir -p '${release_dir}'"

      - name: Upload archive
        run: |
          set -euo pipefail
          release_dir="${SERVER_APP_DIR}/releases/${{ steps.meta.outputs.release_id }}"
          scp -o BatchMode=yes -o StrictHostKeyChecking=yes -P "${SERVER_PORT}" deploy.tgz "${SERVER_USER}@${SERVER_HOST}:${release_dir}/deploy.tgz"

      - name: Deploy on server
        run: |
          set -euo pipefail
          release_id="${{ steps.meta.outputs.release_id }}"
          ssh -o BatchMode=yes -o StrictHostKeyChecking=yes -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
            "APP_DIR='${SERVER_APP_DIR}' RELEASE_ID='${release_id}' SERVICE_NAME='${SERVER_SERVICE_NAME}' bash -s" <<'EOF'
          set -euo pipefail

          if [ -z "${APP_DIR}" ] || [ "${APP_DIR}" = "/" ]; then
            echo "Invalid APP_DIR='${APP_DIR}'" >&2
            exit 1
          fi
          if [ -z "${RELEASE_ID}" ]; then
            echo "Missing RELEASE_ID" >&2
            exit 1
          fi
          if [ -z "${SERVICE_NAME}" ]; then
            echo "Missing SERVICE_NAME" >&2
            exit 1
          fi

          release_dir="${APP_DIR}/releases/${RELEASE_ID}"

          cd "${release_dir}"
          tar -xzf deploy.tgz
          rm -f deploy.tgz

          export NODE_ENV="production"
          export NEXT_TELEMETRY_DISABLED="1"

          npm ci --omit=dev --no-audit --no-fund

          ln -sfn "${release_dir}" "${APP_DIR}/current"

          systemctl restart "${SERVICE_NAME}"

          if ! systemctl is-active --quiet "${SERVICE_NAME}"; then
            systemctl status --no-pager -n 50 "${SERVICE_NAME}" || true
            exit 1
          fi

          if command -v curl >/dev/null 2>&1; then
            curl -fsS --max-time 5 "http://127.0.0.1:3000/" >/dev/null
          fi

          if [ -d "${APP_DIR}/releases" ]; then
            cd "${APP_DIR}/releases"
            ls -1dt */ 2>/dev/null | tail -n +6 | while IFS= read -r dir; do
              [ -n "${dir}" ] && rm -rf -- "${dir}"
            done
          fi
          EOF
